{% extends 'base.html' %}
{% block title %}Create Batch{% endblock %}
{% block content %}
<section class="form-card">
  <h2>Create Wool Batch</h2>
  <p>Assign batch metadata, farm origin, grade, and shearing details.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="contrast">Save</button>
  </form>
</section>
{% endblock %}
